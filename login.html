<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TR808 Subscribe</title>
    <script src="https://static.memberstack.com/scripts/v1/memberstack.js" data-memberstack-id="pk_bd7b12b1a04d5eda0df9"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at top, rgba(234, 179, 8, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }
        .logo-section h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .logo-section p {
            color: #9ca3af;
            font-size: 14px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(234, 179, 8, 0.2);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #d1d5db;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }
        input::placeholder {
            color: #6b7280;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(234, 179, 8, 0.3);
        }
        .links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .links p {
            color: #9ca3af;
            font-size: 14px;
        }
        .links a {
            color: #eab308;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #fff;
        }
        [data-ms-content="members"] {
            text-align: center;
            padding: 40px 20px;
        }
        [data-ms-content="members"] p {
            color: #d1d5db;
            margin-bottom: 20px;
        }
        [data-ms-content="members"] a {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div data-ms-content="!members">
            <div class="logo-section">
                <div class="logo">
                    <img src="tr808-logo.jpg" alt="TR808">
                </div>
                <h1>TR808 Underground Radio</h1>
                <p>Artist Portal</p>
            </div>
            <div class="card">
                <h2>Welcome Back</h2>
                <form data-ms-form="login">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit">Log In</button>
                </form>
                <div class="links">
                    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
                </div>
            </div>
            <a href="/" class="back-link">← Back to home</a>
        </div>
        <div data-ms-content="members">
            <div class="logo-section">
                <div class="logo">
                    <img src="tr808-logo.jpg" alt="TR808">
                </div>
                <h1>TR808 Underground Radio</h1>
            </div>
            <div class="card">
                <p>You are already logged in.</p>
                <a href="dashboard.html">Go to your dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
